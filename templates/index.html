<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETRADUMP - Robot Control Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===================== GLOBAL ===================== */
:root {
  --bg-main: #020617;
  --bg-card: #020617;
  --border-soft: rgba(255,255,255,0.08);

  --safe: #22c55e;
  --warn: #facc15;
  --danger: #ef4444;
  --info: #38bdf8;

  --text-main: #e5e7eb;
  --text-soft: #94a3b8;
}

* {
  box-sizing: border-box;
  font-family: "Inter", system-ui, sans-serif;
}

body {
  margin: 0;
  padding: 0;
  background: #020617;
  color: var(--text-main);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===================== DASHBOARD ===================== */
.dashboard-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 16px;
  min-height: 0;
}

/* ===================== HEADER ===================== */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card);
  border-radius: 14px;
  padding: 14px 20px;
  border: 1px solid var(--border-soft);
  margin-bottom: 0;
}

/* Branding */
.branding {
  display: flex;
  gap: 14px;
  align-items: center;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 22px;
}

.branding-text h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 1px;
}

.branding-text p {
  margin: 0;
  font-size: 12px;
  color: var(--text-soft);
}

/* ===================== STATUS ===================== */
.status-header {
  display: flex;
  gap: 12px;
}

.status-item-header {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--border-soft);
  background: #020617;
  min-width: 100px;
  text-align: center;
}

.status-label-header {
  font-size: 11px;
  color: var(--text-soft);
}

.status-value-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 12px;
  margin-top: 4px;
}

.status-dot-header {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-online {
  color: var(--safe);
}
.status-online .status-dot-header {
  background: var(--safe);
}

.status-offline {
  color: var(--danger);
}
.status-offline .status-dot-header {
  background: var(--danger);
}

.status-connected {
  color: var(--info);
}
.status-connected .status-dot-header {
  background: var(--info);
}

/* ===================== SENSOR CARD ===================== */
.sensor-card {
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border-soft);
  padding: 16px;
  display: flex;
  flex-direction: column;
}

.sensor-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.sensor-title {
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sensor-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(34,197,94,0.15);
  color: var(--safe);
}

/* ===================== SENSOR DISPLAY ===================== */
.sensor-display {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.sensor-item {
  background: #020617;
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.sensor-label {
  font-size: 12px;
  color: var(--text-soft);
  margin-bottom: 6px;
}

.sensor-value {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.sensor-safe { color: var(--safe); }
.sensor-warning { color: var(--warn); }
.sensor-danger { color: var(--danger); }

.sensor-info { color: #38bdf8; }

/* ===================== SENSOR BAR ===================== */
.sensor-visual {
  height: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.sensor-wave {
  width: 100%;
  background: linear-gradient(180deg, #38bdf8, #6366f1);
  transition: height 0.3s ease;
}

/* ===================== LAYOUT GRID ===================== */
.main-grid {
  flex: 1;
  display: flex;
  gap: 16px;
  min-height: 0;
}

.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border-soft);
  overflow: hidden;
}

.camera-wrapper {
  flex: 1;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.camera-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.right-panel {
  width: 380px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="dashboard-container">

<header class="dashboard-header">
  <div class="branding">
    <div class="logo-icon"><i class="fas fa-robot"></i></div>
    <div class="branding-text">
      <h1>NETRADUMP</h1>
      <p>Zero Contact Robot Dashboard</p>
    </div>
  </div>

  <div class="status-header">
    <div class="status-item-header status-online">
      <div class="status-label-header">KAMERA</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>ONLINE
      </div>
    </div>

    <div class="status-item-header status-offline">
      <div class="status-label-header">AI</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>OFFLINE
      </div>
    </div>

    <div class="status-item-header status-connected">
      <div class="status-label-header">CONTROL</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>CONNECTED
      </div>
    </div>

    <div class="status-item-header status-offline" id="status-robot-header">
      <div class="status-label-header">ROBOT</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>
        <span id="robot-status-text">OFFLINE</span>
      </div>
    </div>
  </div>
</header>

<div class="main-grid">
  <!-- CAMERA PANEL -->
  <div class="left-panel">
    <div class="sensor-header" style="margin: 14px 14px 0;">
      <div class="sensor-title"><i class="fas fa-video"></i> Camera Feed</div>
      <div class="sensor-status" id="cam-status-badge" style="background: rgba(34,197,94,0.15); color: var(--safe);">ONLINE</div>
    </div>
    <div class="camera-wrapper">
      <img src="/video_feed" id="main-cam" alt="Camera Feed" onerror="this.onerror=null; document.getElementById('cam-status-badge').textContent='OFFLINE'; document.getElementById('cam-status-badge').style.color='var(--danger)'; document.getElementById('cam-status-badge').style.background='rgba(239, 68, 68, 0.15)'; document.getElementById('cam-fallback-text').style.display='block';">
      <div id="cam-fallback-text" style="display:none; position: absolute; color: var(--danger); font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;"><i class="fas fa-video-slash"></i> FEED NOT AVAILABLE</div>
    </div>
  </div>

  <div class="right-panel">
    <!-- ULTRASONIC SENSOR CARD -->
    <div class="sensor-card" style="flex: none;">
      <div class="sensor-header">
        <div class="sensor-title">
          <i class="fas fa-satellite-dish"></i> Ultrasonic
        </div>
        <div class="sensor-status">ACTIVE</div>
      </div>

      <div class="sensor-display">
        <div class="sensor-item">
          <div class="sensor-label">FRONT</div>
          <div class="sensor-value sensor-safe" id="front-sensor-value">0 cm</div>
          <div class="sensor-visual">
            <div class="sensor-wave" id="front-sensor-wave" style="height:10%"></div>
          </div>
        </div>

        <div class="sensor-item">
          <div class="sensor-label">REAR</div>
          <div class="sensor-value sensor-safe" id="rear-sensor-value">0 cm</div>
          <div class="sensor-visual">
            <div class="sensor-wave" id="rear-sensor-wave" style="height:10%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTROL DATA CARD -->
    <div class="sensor-card" style="flex: 1;">
      <div class="sensor-header">
        <div class="sensor-title">
          <i class="fas fa-gamepad"></i> Control Data
        </div>
        <div class="sensor-status">LIVE</div>
      </div>

      <div class="sensor-display">
        <div class="sensor-item">
          <div class="sensor-label">STEERING</div>
          <div class="sensor-value sensor-info" id="steering-display">0%</div>
          <div class="sensor-visual" style="background: transparent; align-items: center; justify-content: center; height: 60px;">
            <svg id="steering-wheel-svg" style="width: 50px; height: 50px; transition: transform 0.1s linear;" viewBox="0 0 100 100">
              <!-- Outer ring -->
              <circle cx="50" cy="50" r="42" stroke="#e5e7eb" stroke-width="8" fill="none" />
              <!-- Center hub -->
              <circle cx="50" cy="50" r="14" fill="#38bdf8" />
              <!-- Spokes -->
              <path d="M 12 50 L 36 50 M 88 50 L 64 50 M 50 88 L 50 64" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round" />
              <!-- Top marker to easily see rotation -->
              <rect x="46" y="8" width="8" height="12" fill="#ef4444" rx="2" />
            </svg>
          </div>
        </div>

        <div class="sensor-item">
          <div class="sensor-label">THROTTLE</div>
          <div class="sensor-value sensor-info" id="throttle-display">0%</div>
          <div class="sensor-visual">
            <div class="sensor-wave" style="background: linear-gradient(180deg, #10b981, #34d399);" 
                 id="throttle-wave"></div>
          </div>
        </div>
      </div>
      
      <div style="margin-top: auto; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; display:flex; justify-content:space-between; align-items:center; margin-top: 14px;">
        <div class="sensor-label" style="margin:0;">ROBOT MODE</div>
        <div style="font-size: 18px; font-weight: bold; color: #38bdf8;" id="robot-mode">
          MAJU
        </div>
      </div>

      <div style="margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px;">
        <div class="sensor-label" style="margin-bottom: 6px;">DEBUG: ACTIVE BUTTONS</div>
        <div id="debug-buttons" style="font-size: 12px; color: var(--text-soft); font-family: monospace; word-break: break-all;">None</div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
/* ===============================
   WEBSOCKET CONFIG
=============================== */
const WS_URL = "ws://" + window.location.hostname + ":5000/ws_controller";
let ws;
let lastRobotMode = "MAJU"; // Track mode locally

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log("✅ Connected to Flask WebSocket");
    setRobotStatus(true);
  };

  ws.onclose = () => {
    console.log("❌ Disconnected from Flask");
    setRobotStatus(false);
    setTimeout(connectWS, 2000);
  };

  ws.onerror = (error) => {
    console.error("WebSocket error:", error);
    ws.close();
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      console.log("Received data:", data);
      updateAllData(data);
    } catch (e) {
      console.error("JSON Error", e);
    }
  };
}

function updateAllData(data) {
  // Update steering and throttle with visual bars
  updateControlData(data);
  
  // Update ultrasonic sensors (persisted values)
  const ultrasonic = data.ultrasonic || {};
  updateSensors(ultrasonic.front || 0, ultrasonic.back || 0);
  
  // Update mode (persists last set value)
  updateMode(data.mode || lastRobotMode);
}

function updateControlData(data) {
  const steering = data.steering || 0;
  const throttle = data.throttle || 0;
  
  console.log(`Steering: ${steering}, Throttle: ${throttle}`);
  
  // Update steering display
  const steeringEl = document.getElementById('steering-display');
  const steeringIcon = document.getElementById('steering-wheel-svg');
  if (steeringEl) steeringEl.textContent = `${steering}%`;
  
  if (steeringIcon) {
    // Map -100 to 100 percentage to -135 to 135 degrees of rotation for clear visual feedback
    const degrees = (steering / 100) * 135;
    steeringIcon.style.transform = `rotate(${degrees}deg)`;
  }
  
  // Update throttle display
  const throttleEl = document.getElementById('throttle-display');
  const throttleWave = document.getElementById('throttle-wave');
  if (throttleEl) throttleEl.textContent = `${throttle}%`;
  if (throttleWave) {
    throttleWave.style.height = `${Math.min(100, Math.abs(throttle))}%`;
  }

  // Debug buttons
  const dbg = document.getElementById("debug-buttons");
  if (dbg && data.buttons && Array.isArray(data.buttons)) {
    const pressed = data.buttons.map((v, i) => v === 1 ? i : -1).filter(i => i !== -1);
    dbg.textContent = pressed.length ? pressed.join(', ') : "None";
  }
}

function updateMode(mode) {
  const modeEl = document.getElementById('robot-mode');
  if (modeEl && mode) {
    lastRobotMode = mode; // Persist mode locally
    modeEl.textContent = mode;
    
    // Color coding for mode
    if (mode === "MAJU") {
      modeEl.style.color = "#22c55e"; // Green for MAJU
    } else if (mode === "MUNDUR") {
      modeEl.style.color = "#ef4444"; // Red for MUNDUR
    } else {
      modeEl.style.color = "#38bdf8"; // Blue for STANDBY
    }
  }
}

function updateSensors(front, rear) {
  setSensor("front", front);
  setSensor("rear", rear);
}

function setSensor(pos, val) {
  const valueEl = document.getElementById(`${pos}-sensor-value`);
  const waveEl = document.getElementById(`${pos}-sensor-wave`);
  
  if (!valueEl || !waveEl) return;

  // Format value
  let displayValue = val;
  if (val === -1) {
    displayValue = "N/A";
    valueEl.textContent = "N/A";
    valueEl.className = "sensor-value sensor-danger";
    waveEl.style.height = "5%";
    return;
  }
  
  valueEl.textContent = `${displayValue.toFixed(1)} cm`;

  // Color coding based on distance
  if (val <= 10) {
    valueEl.className = "sensor-value sensor-danger";
  } else if (val <= 50) {
    valueEl.className = "sensor-value sensor-warning";
  } else {
    valueEl.className = "sensor-value sensor-safe";
  }

  // Visual bar (inverse: closer = taller bar)
  const h = Math.max(5, Math.min(95, 100 - (val / 200 * 100)));
  waveEl.style.height = `${h}%`;
}

function setRobotStatus(online) {
  const el = document.getElementById("status-robot-header");
  const txt = document.getElementById("robot-status-text");

  if (el && txt) {
    el.className = online
      ? "status-item-header status-online"
      : "status-item-header status-offline";

    txt.textContent = online ? "ONLINE" : "OFFLINE";
  }
}

/* ===============================
   INIT
=============================== */
document.addEventListener("DOMContentLoaded", () => {
  console.log("Dashboard initialized");
  connectWS();
  
  // Set initial mode display
  updateMode("MAJU");
});
</script>

</body>
</html>
