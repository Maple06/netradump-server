<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETRADUMP - Robot Control Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===================== GLOBAL ===================== */
:root {
  --bg-main: #020617;
  --bg-card: #020617;
  --border-soft: rgba(255,255,255,0.08);

  --safe: #22c55e;
  --warn: #facc15;
  --danger: #ef4444;
  --info: #38bdf8;

  --text-main: #e5e7eb;
  --text-soft: #94a3b8;
}

* {
  box-sizing: border-box;
  font-family: "Inter", system-ui, sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #020617, #020617);
  color: var(--text-main);
}

/* ===================== DASHBOARD ===================== */
.dashboard-container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* ===================== HEADER ===================== */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card);
  border-radius: 14px;
  padding: 18px 22px;
  border: 1px solid var(--border-soft);
  margin-bottom: 20px;
}

/* Branding */
.branding {
  display: flex;
  gap: 14px;
  align-items: center;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 22px;
}

.branding-text h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 1px;
}

.branding-text p {
  margin: 0;
  font-size: 12px;
  color: var(--text-soft);
}

/* ===================== STATUS ===================== */
.status-header {
  display: flex;
  gap: 12px;
}

.status-item-header {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--border-soft);
  background: #020617;
  min-width: 100px;
  text-align: center;
}

.status-label-header {
  font-size: 11px;
  color: var(--text-soft);
}

.status-value-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 12px;
  margin-top: 4px;
}

.status-dot-header {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-online {
  color: var(--safe);
}
.status-online .status-dot-header {
  background: var(--safe);
}

.status-offline {
  color: var(--danger);
}
.status-offline .status-dot-header {
  background: var(--danger);
}

.status-connected {
  color: var(--info);
}
.status-connected .status-dot-header {
  background: var(--info);
}

/* ===================== SENSOR CARD ===================== */
.sensor-card {
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border-soft);
  padding: 18px;
}

.sensor-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.sensor-title {
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sensor-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(34,197,94,0.15);
  color: var(--safe);
}

/* ===================== SENSOR DISPLAY ===================== */
.sensor-display {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.sensor-item {
  background: #020617;
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.sensor-label {
  font-size: 12px;
  color: var(--text-soft);
  margin-bottom: 6px;
}

.sensor-value {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.sensor-safe { color: var(--safe); }
.sensor-warning { color: var(--warn); }
.sensor-danger { color: var(--danger); }

.sensor-info { color: #38bdf8; }

/* ===================== SENSOR BAR ===================== */
.sensor-visual {
  height: 90px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.sensor-wave {
  width: 100%;
  background: linear-gradient(180deg, #38bdf8, #6366f1);
  transition: height 0.3s ease;
}
</style>
</head>

<body>

<div class="dashboard-container">

<header class="dashboard-header">
  <div class="branding">
    <div class="logo-icon"><i class="fas fa-robot"></i></div>
    <div class="branding-text">
      <h1>NETRADUMP</h1>
      <p>Zero Contact Robot Dashboard</p>
    </div>
  </div>

  <div class="status-header">
    <div class="status-item-header status-online">
      <div class="status-label-header">KAMERA</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>ONLINE
      </div>
    </div>

    <div class="status-item-header status-offline">
      <div class="status-label-header">AI</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>OFFLINE
      </div>
    </div>

    <div class="status-item-header status-connected">
      <div class="status-label-header">CONTROL</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>CONNECTED
      </div>
    </div>

    <div class="status-item-header status-offline" id="status-robot-header">
      <div class="status-label-header">ROBOT</div>
      <div class="status-value-header">
        <span class="status-dot-header"></span>
        <span id="robot-status-text">OFFLINE</span>
      </div>
    </div>
  </div>
</header>

<!-- ULTRASONIC SENSOR CARD -->
<div class="sensor-card">
  <div class="sensor-header">
    <div class="sensor-title">
      <i class="fas fa-satellite-dish"></i> Ultrasonic Sensor
    </div>
    <div class="sensor-status">ACTIVE</div>
  </div>

  <div class="sensor-display">
    <div class="sensor-item">
      <div class="sensor-label">FRONT</div>
      <div class="sensor-value sensor-safe" id="front-sensor-value">0 cm</div>
      <div class="sensor-visual">
        <div class="sensor-wave" id="front-sensor-wave" style="height:10%"></div>
      </div>
    </div>

    <div class="sensor-item">
      <div class="sensor-label">REAR</div>
      <div class="sensor-value sensor-safe" id="rear-sensor-value">0 cm</div>
      <div class="sensor-visual">
        <div class="sensor-wave" id="rear-sensor-wave" style="height:10%"></div>
      </div>
    </div>
  </div>
</div>

<!-- CONTROL DATA CARD (Separate card) -->
<div class="sensor-card" style="margin-top: 20px;">
  <div class="sensor-header">
    <div class="sensor-title">
      <i class="fas fa-gamepad"></i> Control Data
    </div>
    <div class="sensor-status">LIVE</div>
  </div>

  <div class="sensor-display">
    <div class="sensor-item">
      <div class="sensor-label">STEERING</div>
      <div class="sensor-value sensor-info" id="steering-display">0</div>
      <div class="sensor-visual">
        <div class="sensor-wave" style="background: linear-gradient(180deg, #f97316, #f59e0b);" 
             id="steering-wave"></div>
      </div>
    </div>

    <div class="sensor-item">
      <div class="sensor-label">THROTTLE</div>
      <div class="sensor-value sensor-info" id="throttle-display">0%</div>
      <div class="sensor-visual">
        <div class="sensor-wave" style="background: linear-gradient(180deg, #10b981, #34d399);" 
             id="throttle-wave"></div>
      </div>
    </div>
  </div>
  
  <div style="margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px;">
    <div class="sensor-label">ROBOT MODE</div>
    <div style="font-size: 16px; font-weight: bold; color: #38bdf8;" id="robot-mode">
      MAJU
    </div>
  </div>
</div>

</div>

<script>
/* ===============================
   WEBSOCKET CONFIG
=============================== */
const WS_URL = "ws://" + window.location.hostname + ":5000/ws_controller";
let ws;
let lastRobotMode = "MAJU"; // Track mode locally

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log("✅ Connected to Flask WebSocket");
    setRobotStatus(true);
  };

  ws.onclose = () => {
    console.log("❌ Disconnected from Flask");
    setRobotStatus(false);
    setTimeout(connectWS, 2000);
  };

  ws.onerror = (error) => {
    console.error("WebSocket error:", error);
    ws.close();
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      console.log("Received data:", data);
      updateAllData(data);
    } catch (e) {
      console.error("JSON Error", e);
    }
  };
}

function updateAllData(data) {
  // Update steering and throttle with visual bars
  updateControlData(data);
  
  // Update ultrasonic sensors (persisted values)
  const ultrasonic = data.ultrasonic || {};
  updateSensors(ultrasonic.front || 0, ultrasonic.back || 0);
  
  // Update mode (persists last set value)
  updateMode(data.mode || lastRobotMode);
}

function updateControlData(data) {
  const steering = data.steering || 0;
  const throttle = data.throttle || 0;
  
  console.log(`Steering: ${steering}, Throttle: ${throttle}`);
  
  // Update steering display
  const steeringEl = document.getElementById('steering-display');
  const steeringWave = document.getElementById('steering-wave');
  if (steeringEl) steeringEl.textContent = steering;
  if (steeringWave) {
    const steeringPercent = Math.abs(steering) / 100 * 100;
    steeringWave.style.height = `${Math.min(100, steeringPercent)}%`;
  }
  
  // Update throttle display
  const throttleEl = document.getElementById('throttle-display');
  const throttleWave = document.getElementById('throttle-wave');
  if (throttleEl) throttleEl.textContent = `${throttle}%`;
  if (throttleWave) {
    throttleWave.style.height = `${Math.min(100, throttle)}%`;
  }
}

function updateMode(mode) {
  const modeEl = document.getElementById('robot-mode');
  if (modeEl && mode) {
    lastRobotMode = mode; // Persist mode locally
    modeEl.textContent = `Mode: ${mode}`;
    
    // Color coding for mode
    if (mode === "MAJU") {
      modeEl.style.color = "#22c55e"; // Green for MAJU
    } else if (mode === "MUNDUR") {
      modeEl.style.color = "#ef4444"; // Red for MUNDUR
    } else {
      modeEl.style.color = "#38bdf8"; // Blue for STANDBY
    }
  }
}

function updateSensors(front, rear) {
  setSensor("front", front);
  setSensor("rear", rear);
}

function setSensor(pos, val) {
  const valueEl = document.getElementById(`${pos}-sensor-value`);
  const waveEl = document.getElementById(`${pos}-sensor-wave`);
  
  if (!valueEl || !waveEl) return;

  // Format value
  let displayValue = val;
  if (val === -1) {
    displayValue = "N/A";
    valueEl.textContent = "N/A";
    valueEl.className = "sensor-value sensor-danger";
    waveEl.style.height = "5%";
    return;
  }
  
  valueEl.textContent = `${displayValue.toFixed(1)} cm`;

  // Color coding based on distance
  if (val <= 10) {
    valueEl.className = "sensor-value sensor-danger";
  } else if (val <= 50) {
    valueEl.className = "sensor-value sensor-warning";
  } else {
    valueEl.className = "sensor-value sensor-safe";
  }

  // Visual bar (inverse: closer = taller bar)
  const h = Math.max(5, Math.min(95, 100 - (val / 200 * 100)));
  waveEl.style.height = `${h}%`;
}

function setRobotStatus(online) {
  const el = document.getElementById("status-robot-header");
  const txt = document.getElementById("robot-status-text");

  if (el && txt) {
    el.className = online
      ? "status-item-header status-online"
      : "status-item-header status-offline";

    txt.textContent = online ? "ONLINE" : "OFFLINE";
  }
}

/* ===============================
   INIT
=============================== */
document.addEventListener("DOMContentLoaded", () => {
  console.log("Dashboard initialized");
  connectWS();
  
  // Set initial mode display
  updateMode("MAJU");
});
</script>

</body>
</html>
